name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.14"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked

      - name: Compile script
        run: uv run python -m py_compile cpa_warden.py auto_maintain.py clean_codex_accounts.py

      - name: Check CLI help (core)
        run: uv run python cpa_warden.py --help

      - name: Check CLI help (auto maintain)
        run: uv run python auto_maintain.py --help

      - name: Run auto maintain tests
        run: uv run python -m unittest -v tests/test_auto_maintain.py
