name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.14"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run quality gates (BASE + G1 + G2)
        run: uv run python tools/quality_gate_runner.py --output results/quality_gate_report_ci.md --strict

      - name: Publish quality gate summary
        if: always()
        run: |
          {
            echo "## Quality Gate (Python ${{ matrix.python-version }})"
            if [ -f results/quality_gate_report_ci.md ]; then
              OVERALL_LINE="$(grep -m1 '^Overall:' results/quality_gate_report_ci.md || true)"
              if [ -n "$OVERALL_LINE" ]; then
                echo "$OVERALL_LINE"
              fi
              echo ""
              echo "### Gate Summary"
              awk '/^## Gate Summary/{flag=1; next} /^## /{if (flag) exit} flag {print}' results/quality_gate_report_ci.md
            else
              echo "quality_gate_report_ci.md not found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload quality gate report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-report-py${{ matrix.python-version }}
          path: results/quality_gate_report_ci.md
          if-no-files-found: warn
